<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .update-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }
        .update-container h2 {
            color: #333333;
            margin-top: 0;
            margin-bottom: 24px;
        }
        .update-container form {
            display: flex;
            flex-direction: column;
        }
        .update-container input[type="file"] {
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            background-color: #ffffff;
            cursor: pointer;
        }
        .update-container input[type="file"]:focus {
            border-color: #3b82f6;
            outline: none;
        }
        .update-container button {
            background-color: #3b82f6;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 100%;
            margin-bottom: 15px;
        }
        .update-container button:hover {
            background-color: #2563eb;
        }
        .update-container a.cancel-btn {
            display: inline-block;
            background-color: #e5e7eb;
            color: #374151;
            padding: 12px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        .update-container a.cancel-btn:hover {
            background-color: #d1d5db;
        }
        .current-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px auto;
            border: 4px solid #f3f4f6;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
    <div class="update-container">
        <h2>Update Profile Photo</h2>
        
        {% if user.profile.image %}
            <img src="{{ user.profile.image.url }}" alt="Current Photo" class="current-photo">
        {% else %}
            <div class="current-photo" style="display: flex; justify-content: center; align-items: center; background: #f3f4f6; color: #4b5563; font-size: 3rem; font-weight: bold;">
                {{ user.username|make_list|first|upper }}
            </div>
        {% endif %}
        
        <form action="" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="image" accept="image/*" title="Choose a new profile photo" aria-label="Choose a new profile photo" required>
            <button type="submit">Upload Photo</button>
            <a href="{% url 'dashboard' %}" class="cancel-btn">Cancel</a>
        </form>
    </div>
</body>
</html>
